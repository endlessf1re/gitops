apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      imagePullSecrets:
      - name: nexus-auth
      containers:
      - name: app
        image: host.k3d.internal.:5000/nginx-test
        ports:
        - containerPort: 80
